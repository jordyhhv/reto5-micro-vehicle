apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-reservation-cloudnative
  labels:
    app: vehicle-reservation-cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle-reservation-cloudnative
  template:
    metadata:
      labels:
        app: vehicle-reservation-cloudnative
    spec:
      containers:
        - name: vehicle-reservation-cloudnative
          image: vehicle-reservation-cloudnative:native
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18080
            - name: grpc
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 18080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 18080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
